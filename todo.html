<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List Web App</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:url("https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=1200")
    no-repeat center center/cover;
    min-height:100vh;
    padding:30px;
}

.header{
    background:#f1f1f1;
    padding:15px;
    text-align:center;
    font-size:24px;
    margin-bottom:30px;
}

.container{
    display:flex;
    gap:30px;
}

.form-box{
    width:300px;
    background:white;
    padding:20px;
    border-radius:5px;
}

.form-box input,
.form-box textarea{
    width:100%;
    padding:10px;
    margin-bottom:15px;
}

.form-box button{
    width:100%;
    padding:10px;
    border:none;
    background:#28a745;
    color:white;
    cursor:pointer;
}

.task-section{
    flex:1;
}

.heading{
    display:grid;
    grid-template-columns:1fr 2fr 100px;
    color:white;
    margin-bottom:15px;
    font-weight:bold;
}

.task-card{
    background:white;
    padding:20px;
    margin-bottom:15px;
    border-radius:5px;
    display:grid;
    grid-template-columns:1fr 2fr 100px;
    align-items:center;
}

.delete-btn{
    background:#dc3545;
    color:white;
    border:none;
    padding:8px;
    cursor:pointer;
}

.time{
    font-size:12px;
    color:gray;
    margin-top:5px;
}

</style>
</head>
<body>

<div class="header">
    To-Do List Web App
</div>

<div class="container">

    <div class="form-box">

        <input type="text" id="title" placeholder="Title">

        <textarea id="description"
        rows="10"
        placeholder="Description"></textarea>

        <button onclick="saveTask()">Save</button>

    </div>

    <div class="task-section">

        <div class="heading">
            <div>Title</div>
            <div>Description</div>
            <div>Delete</div>
        </div>

        <div id="taskList"></div>

    </div>

</div>

<script>

function saveTask()
{
    let title =
    document.getElementById("title").value;

    let description =
    document.getElementById("description").value;

    if(title === "" || description === "")
    {
        alert("Please fill all fields");
        return;
    }

    let taskCard =
    document.createElement("div");

    taskCard.className = "task-card";

    let currentTime =
    new Date().toLocaleString();

    taskCard.innerHTML = `
        <div>
            <strong>${title}</strong>
            <div class="time">${currentTime}</div>
        </div>

        <div>${description}</div>

        <div>
            <button class="delete-btn"
            onclick="deleteTask(this)">
            X
            </button>
        </div>
    `;

    document.getElementById("taskList")
    .appendChild(taskCard);

    document.getElementById("title").value = "";
    document.getElementById("description").value = "";
}

function deleteTask(button)
{
    button.parentElement.parentElement.remove();
}

</script>

</body>
</html>
